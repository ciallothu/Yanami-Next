name: Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Android test, lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Verify release metadata
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          BUILD_NUMBER="$(tr -d '[:space:]' < VERSION_CODE)"
          test -n "$VERSION"
          test -n "$BUILD_NUMBER"
          [[ "$VERSION" =~ ^([0-9]+)\.([0-9]{1,2})\.([0-9]{1,2})$ ]]
          EXPECTED_BUILD_NUMBER="$((
            10#${BASH_REMATCH[1]} * 1000000 +
            10#${BASH_REMATCH[2]} * 10000 +
            10#${BASH_REMATCH[3]} * 100
          ))"
          test "$BUILD_NUMBER" = "$EXPECTED_BUILD_NUMBER"
          grep -Fq "MARKETING_VERSION = ${VERSION};" apps/iphone/Yanami.xcodeproj/project.pbxproj
          grep -Fq "CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};" apps/iphone/Yanami.xcodeproj/project.pbxproj
          test "$(jq -r '.versionName' docs/update.json)" = "$VERSION"
          test "$(jq -r '.versionCode' docs/update.json)" = "$BUILD_NUMBER"

      - name: Test, lint and build APKs
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest lintDebug assembleDebug

      - name: Upload APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Yanami-Next-android-${{ github.sha }}
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Yanami-Next-android-lint-${{ github.sha }}
          path: apps/android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 7

  iphone:
    name: iPhone build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build unsigned iPhone app
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          BUILD_NUMBER="$(tr -d '[:space:]' < VERSION_CODE)"
          xcodebuild \
            -project apps/iphone/Yanami.xcodeproj \
            -scheme Yanami \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            build

      - name: Package unsigned IPA
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          mkdir -p build/package/Payload
          ditto "build/ios/Build/Products/Release-iphoneos/Yanami.app" \
            "build/package/Payload/Yanami Next.app"
          (cd build/package && ditto -c -k --sequesterRsrc --keepParent Payload \
            "Yanami-Next-v${VERSION}-unsigned.ipa")

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Yanami-Next-iphone-${{ github.sha }}
          path: build/package/Yanami-Next-*-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
