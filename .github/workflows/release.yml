name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag, version and main ancestry
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          test -n "$VERSION"
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Release must run from tag v${VERSION}." >&2
            exit 1
          fi
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"
          test "$(grep -Ec '^[[:space:]]*MARKETING_VERSION = ' apps/iphone/Yanami.xcodeproj/project.pbxproj)" -eq 2
          test "$(grep -Fc "MARKETING_VERSION = ${VERSION};" apps/iphone/Yanami.xcodeproj/project.pbxproj)" -eq 2
          BUILD_NUMBER="$(tr -d '[:space:]' < VERSION_CODE)"
          [[ "$BUILD_NUMBER" =~ ^[0-9]{1,10}$ ]]
          [[ "$VERSION" =~ ^([0-9]+)\.([0-9]{1,2})\.([0-9]{1,2})$ ]]
          BASE_BUILD_NUMBER="$((
            10#${BASH_REMATCH[1]} * 1000000 +
            10#${BASH_REMATCH[2]} * 10000 +
            10#${BASH_REMATCH[3]} * 100
          ))"
          BUILD_NUMBER_VALUE="$((10#$BUILD_NUMBER))"
          test "$BUILD_NUMBER_VALUE" -ge "$BASE_BUILD_NUMBER"
          test "$BUILD_NUMBER_VALUE" -lt "$((BASE_BUILD_NUMBER + 100))"
          test "$(grep -Ec '^[[:space:]]*CURRENT_PROJECT_VERSION = ' apps/iphone/Yanami.xcodeproj/project.pbxproj)" -eq 2
          test "$(grep -Fc "CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};" apps/iphone/Yanami.xcodeproj/project.pbxproj)" -eq 2
          test "$(jq -r '.versionName' docs/update.json)" = "$VERSION"
          test "$(jq -r '.versionCode' docs/update.json)" = "$BUILD_NUMBER"
          test -f ".github/release-notes/v${VERSION}.md"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Require an unused release entry
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set +e
          RESPONSE="$(gh api --include "repos/${GITHUB_REPOSITORY}/releases/tags/v${VERSION}" 2>&1)"
          STATUS=$?
          set -e
          if [[ "$STATUS" -eq 0 ]]; then
            echo "Release v${VERSION} already exists; refusing an in-place asset overwrite." >&2
            exit 1
          fi
          if ! grep -Eq 'HTTP[^0-9]*404|\(HTTP 404\)' <<<"$RESPONSE"; then
            printf '%s\n' "$RESPONSE" >&2
            echo "Could not prove that release v${VERSION} is absent." >&2
            exit 1
          fi

  android:
    name: Signed Android release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Decode signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/yanami-release.jks"
          chmod 600 "$RUNNER_TEMP/yanami-release.jks"

      - name: Test, lint and build signed APKs
        working-directory: apps/android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/yanami-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest lintRelease assembleRelease

      - name: Verify APK signatures
        env:
          EXPECTED_CERT_SHA256: 3D79E7323B0482915843F306E3F8B5F987DE06CDE9A1FF0B8736D8C1095BCFF1
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          BUILD_NUMBER="$(tr -d '[:space:]' < VERSION_CODE)"
          for apk in apps/android/app/build/outputs/apk/release/*.apk; do
            "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$apk"
            ACTUAL_CERT_SHA256="$(
              "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs "$apk" |
                sed -n 's/^Signer #1 certificate SHA-256 digest: //p' |
                head -n 1 |
                tr '[:lower:]' '[:upper:]'
            )"
            test "$ACTUAL_CERT_SHA256" = "$EXPECTED_CERT_SHA256"
            BADGING="$("$ANDROID_HOME/build-tools/36.0.0/aapt" dump badging "$apk")"
            grep -Fq "versionCode='${BUILD_NUMBER}'" <<<"$BADGING"
            grep -Fq "versionName='${VERSION}'" <<<"$BADGING"
            grep -Fq "package: name='com.sekusarisu.yanami'" <<<"$BADGING"
            grep -Fq "application-label:'Yanami Next'" <<<"$BADGING"
          done

      - name: Prepare Android assets
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir -p release-assets/android
          for apk in apps/android/app/build/outputs/apk/release/*.apk; do
            name="$(basename "$apk")"
            case "$name" in
              *universal*) target="Yanami-Next-v${VERSION}-universal.apk" ;;
              *arm64-v8a*) target="Yanami-Next-v${VERSION}-arm64-v8a.apk" ;;
              *armeabi-v7a*) target="Yanami-Next-v${VERSION}-armeabi-v7a.apk" ;;
              *) target="Yanami-Next-v${VERSION}-${name}" ;;
            esac
            cp "$apk" "release-assets/android/$target"
          done
          (cd release-assets/android && sha256sum *.apk > SHA256SUMS-android.txt)

      - name: Upload Android assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-android
          path: release-assets/android/*
          if-no-files-found: error

      - name: Remove signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/yanami-release.jks"

  iphone:
    name: Unsigned iPhone release
    needs: validate
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Build unsigned iPhone app
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          BUILD_NUMBER="$(tr -d '[:space:]' < VERSION_CODE)"
          xcodebuild \
            -project apps/iphone/Yanami.xcodeproj \
            -scheme Yanami \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            build

      - name: Package iPhone asset
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          APP_INFO="build/ios/Build/Products/Release-iphoneos/Yanami.app/Info.plist"
          BUILD_NUMBER="$(tr -d '[:space:]' < VERSION_CODE)"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_INFO")" = "$VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_INFO")" = "$BUILD_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$APP_INFO")" = "Yanami Next"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_INFO")" = "com.sekusarisu.yanami.ios"
          mkdir -p release-assets/iphone/Payload
          ditto "build/ios/Build/Products/Release-iphoneos/Yanami.app" \
            "release-assets/iphone/Payload/Yanami Next.app"
          (cd release-assets/iphone && ditto -c -k --sequesterRsrc --keepParent Payload \
            "Yanami-Next-v${VERSION}-unsigned.ipa")
          rm -rf release-assets/iphone/Payload
          (cd release-assets/iphone && shasum -a 256 *.ipa > SHA256SUMS-iphone.txt)

      - name: Upload iPhone asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-iphone
          path: release-assets/iphone/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [validate, android, iphone]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: production
    steps:
      - name: Checkout release notes
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Verify complete release asset set
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          mapfile -t ACTUAL < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)
          EXPECTED=(
            "SHA256SUMS-android.txt"
            "SHA256SUMS-iphone.txt"
            "Yanami-Next-v${VERSION}-arm64-v8a.apk"
            "Yanami-Next-v${VERSION}-armeabi-v7a.apk"
            "Yanami-Next-v${VERSION}-universal.apk"
            "Yanami-Next-v${VERSION}-unsigned.ipa"
          )
          mapfile -t EXPECTED < <(printf '%s\n' "${EXPECTED[@]}" | sort)
          test "${#ACTUAL[@]}" -eq "${#EXPECTED[@]}"
          diff <(printf '%s\n' "${EXPECTED[@]}") <(printf '%s\n' "${ACTUAL[@]}")
          (
            cd release-assets
            sha256sum --check SHA256SUMS-android.txt
            sha256sum --check SHA256SUMS-iphone.txt
          )

      - name: Atomically publish verified release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          RELEASE_ID=""
          cleanup_failed_draft() {
            status=$?
            if [[ "$status" -ne 0 && -n "$RELEASE_ID" ]]; then
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" >/dev/null 2>&1 || true
            fi
            exit "$status"
          }
          trap cleanup_failed_draft EXIT

          NOTES="$(cat ".github/release-notes/v${VERSION}.md")"
          CREATED="$({
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              --raw-field "tag_name=v${VERSION}" \
              --raw-field "target_commitish=${GITHUB_SHA}" \
              --raw-field "name=Yanami Next v${VERSION}" \
              --raw-field "body=${NOTES}" \
              --field draft=true \
              --field prerelease=false \
              --field generate_release_notes=false
          })"
          RELEASE_ID="$(jq -er '.id' <<<"$CREATED")"
          test "$(jq -r '.draft' <<<"$CREATED")" = "true"
          test "$(jq -r '.tag_name' <<<"$CREATED")" = "v${VERSION}"

          gh release upload "v${VERSION}" release-assets/* \
            --repo "$GITHUB_REPOSITORY"

          LOCAL_ASSETS="$({
            find release-assets -maxdepth 1 -type f -print0 |
              sort --zero-terminated |
              while IFS= read -r -d '' asset; do
                name="$(basename "$asset")"
                size="$(stat --format='%s' "$asset")"
                digest="$(sha256sum "$asset" | cut -d ' ' -f 1)"
                printf '%s\t%s\tsha256:%s\tuploaded\n' "$name" "$size" "$digest"
              done
          })"

          ASSETS=""
          for attempt in {1..10}; do
            ASSETS="$(
              gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate
            )"
            if [[ "$(jq 'length' <<<"$ASSETS")" -eq 6 ]] &&
              [[ "$(jq '[.[] | select(.state != "uploaded" or (.digest | type) != "string")] | length' <<<"$ASSETS")" -eq 0 ]]; then
              break
            fi
            if [[ "$attempt" -eq 10 ]]; then
              echo "Release asset digests did not become ready." >&2
              exit 1
            fi
            sleep 3
          done
          REMOTE_ASSETS="$({
            jq -r '.[] | [.name, (.size | tostring), .digest, .state] | @tsv' <<<"$ASSETS" |
              sort
          })"
          diff <(printf '%s\n' "$LOCAL_ASSETS") <(printf '%s\n' "$REMOTE_ASSETS")

          PUBLISHED="$({
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              --field draft=false \
              --field prerelease=false \
              --raw-field make_latest=true
          })"
          test "$(jq -r '.draft' <<<"$PUBLISHED")" = "false"
          test "$(jq -r '.prerelease' <<<"$PUBLISHED")" = "false"
          test "$(jq -r '.tag_name' <<<"$PUBLISHED")" = "v${VERSION}"
          test "$(jq -r '.assets | length' <<<"$PUBLISHED")" -eq 6
          jq -er '.html_url' <<<"$PUBLISHED"

          trap - EXIT
